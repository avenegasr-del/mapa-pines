<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa Pines v2</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body { margin: 0; font-family: Arial; background: #0f172a; color: white; }
    #chart { width: 100%; height: 100vh; position: relative; }
    .panel {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 10px;
      z-index: 10;
    }
    button { margin-top: 5px; }

    /* capa para capturar clicks */
    #clickLayer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      cursor: crosshair;
    }
  </style>
</head>
<body>

<div class="panel">
  <div>Pines: <span id="count">0</span></div>
  <button onclick="clearPins()">Limpiar</button>
</div>

<div id="chart">
  <div id="clickLayer"></div>
</div>

<script>
const chart = document.getElementById('chart');
const clickLayer = document.getElementById('clickLayer');
const count = document.getElementById('count');

let pins = [];

// 🌍 Mapa SIN internet
const layout = {
  geo: {
    scope: 'world',
    projection: { type: 'natural earth' },
    showland: true,
    landcolor: '#1f2937',
    showcountries: true,
    countrycolor: '#374151'
  },
  margin: { t:0, b:0, l:0, r:0 }
};

const data = [{
  type: 'scattergeo',
  mode: 'markers+text',
  lat: [],
  lon: [],
  text: [],
  textposition: 'top center',
  marker: { size: 10, color: 'red' }
}];

Plotly.newPlot('chart', data, layout);

// ============================
// CLICK SIMULADO (sin servidor)
// ============================

clickLayer.addEventListener('click', function(e){
  const rect = clickLayer.getBoundingClientRect();

  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const width = rect.width;
  const height = rect.height;

  // Aproximación: convertir pixel → lat/lon
  const lon = (x / width) * 360 - 180;
  const lat = 90 - (y / height) * 180;

  pins.push({ lat, lon });
  updatePins();
});

function updatePins() {
  Plotly.restyle('chart', {
    lat: [pins.map(p => p.lat)],
    lon: [pins.map(p => p.lon)],
    text: [pins.map((_,i)=>'P'+(i+1))]
  });

  count.textContent = pins.length;
}

function clearPins() {
  pins = [];
  updatePins();
}

// ============================
// TESTS
// ============================

function runTests() {
  console.log("Running tests...");

  pins.push({ lat: 4.7, lon: -74.0 });
  updatePins();
  console.assert(pins.length === 1, "Test 1 failed");

  clearPins();
  console.assert(pins.length === 0, "Test 2 failed");
  pins.push({ lat: 1, lon: 1 });
  pins.push({ lat: 2, lon: 2 });
  updatePins();
  console.assert(pins.length === 2, "Test 3 failed");

  console.log("Tests completados");
}

setTimeout(runTests, 1000);

</script>

</body>
</html>
